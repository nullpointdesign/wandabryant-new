<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <title>Wanda Bryant – Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&family=Bebas+Neue&family=Oswald:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050506;
      --bg-elevated: #111016;
      --bg-soft: #18171f;
      --accent: #c8930a;
      --accent-soft: #e0b85a;
      --text-main: #f3f3f3;
      --text-muted: #a29aa8;
      --border-subtle: #262331;
      --max-width: 1120px;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow-soft: 0 22px 60px rgba(0, 0, 0, 0.7);
      --shadow-subtle: 0 14px 40px rgba(0, 0, 0, 0.55);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #1b1824 0, #050506 55%, #020203 100%);
      color: var(--text-main);
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
      background: linear-gradient(
        to bottom,
        rgba(5, 5, 8, 0.96),
        rgba(5, 5, 8, 0.86),
        rgba(5, 5, 8, 0.78)
      );
      border-bottom: 1px solid rgba(38, 35, 49, 0.9);
    }

    .header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 14px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .brand-title {
      font-family: "Playfair Display", serif;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      gap: 18px;
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    nav a {
      position: relative;
      padding-bottom: 4px;
      color: var(--text-muted);
    }

    nav a.active {
      color: var(--text-main);
    }

    nav a.active::after,
    nav a:hover::after {
      width: 100%;
    }

    nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.22s ease;
    }

    /* Page container */
    .page {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 32px 20px 60px;
      flex: 1 0 auto;
    }

    h1 {
      font-family: "Playfair Display", serif;
      font-size: 2.4rem;
      margin-bottom: 2rem;
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* Contact card */
    .contact-card {
      max-width: 700px;
      margin: 0 auto;
      padding: 24px;
      border-radius: var(--radius-lg);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-subtle);
      text-align: center;
    }

    .contact-intro {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .contact-item {
      margin-bottom: 1.5rem;
    }

    .contact-label {
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .contact-link {
      font-size: 1.1rem;
      color: var(--accent-soft);
      text-decoration: underline;
      text-underline-offset: 4px;
      transition: color 0.2s ease;
    }

    .contact-link:hover {
      color: var(--accent);
    }

    /* Footer */
    footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      text-align: center;
      font-size: 0.85rem;
      padding: 4rem 1.5rem 3rem;
      border-top: 1px solid #333;
      color: #e6e6e6;
    }

    .footer-email {
      color: #e6e6e6;
      text-decoration: none;
    }

    .footer-email:hover {
      text-decoration: underline;
    }

    .npd-signature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      opacity: 0.8;
      text-decoration: none;
      margin-top: 1rem;
      transition: opacity 0.25s;
    }
    .npd-signature:hover { opacity: 1; }

    .npd-logo-box {
      width: 26px; height: 26px;
      border: 1px solid #c8841a;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .npd-logo-box span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      line-height: 1;
      color: #c8841a;
    }
    .npd-logo-box::after {
      content: '';
      position: absolute;
      width: 3px; height: 3px;
      background: #c8841a;
      bottom: 3px; right: 3px;
    }
    .npd-text {
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      line-height: 1;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #a89a7a;
    }
    .npd-text b { color: #e8d4a8; font-weight: 400; }

    @media (max-width: 640px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }
      nav {
        width: 100%;
        justify-content: flex-start;
        flex-wrap: wrap;
        row-gap: 6px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div>
        <div class="brand-title">Art by Wanda Bryant</div>
        <div class="brand-subtitle">Textile &amp; Fiber Art</div>
      </div>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="whats-new.html">Recent Work</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </div>
</header>

<div class="page">
  <h1>Contact</h1>

  <div class="contact-card">
    <p class="contact-intro">
      For commissions, exhibitions, and sales, please contact me:
    </p>

    <div class="contact-item">
      <div class="contact-label">Email</div>
      <a href="mailto:artbywandabryant@gmail.com" class="contact-link">
        artbywandabryant@gmail.com
      </a>
    </div>

    <div class="contact-item">
      <div class="contact-label">Instagram</div>
      <a href="https://www.instagram.com/artbywandabryant/" target="_blank" rel="noopener" class="contact-link">
        @artbywandabryant
      </a>
    </div>
  </div>
</div>

<footer>
  <span><a href="mailto:artbywandabryant@gmail.com" class="footer-email">artbywandabryant@gmail.com</a></span>
  <a href="https://nullpointdesign.github.io" target="_blank" rel="noopener" class="npd-signature">
    <div class="npd-logo-box"><span>N</span></div>
    <div class="npd-text">Site design by Catherine Anderson @ <b>Null Point Design</b></div>
  </a>
</footer>

</body>
</html>
